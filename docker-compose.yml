version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chartsnap_db
    environment:
      POSTGRES_USER: chartsnap_admin
      POSTGRES_PASSWORD: chartsnap_password
      POSTGRES_DB: chartsnap_v2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: chartsnap_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
